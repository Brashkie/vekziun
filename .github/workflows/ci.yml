name: ci

# CHECK en cada push a main y en pull requests. NO publica nada.
# Es el semáforo: te dice si el código compila y el contrato sigue intacto.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Contract test
        run: npm test
