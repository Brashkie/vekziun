name: release

# Publica la herramienta @vekziun/napi (TypeScript puro, sin binarios nativos).
# Se dispara al empujar un tag de versión (ej: v0.1.0).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest # TS puro: un solo OS, sin matriz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & build
        run: |
          npm ci
          npm run build

      # verificación: el contrato debe seguir intacto antes de publicar
      - name: Run contract test
        run: npm test

      # mostrar qué se publicaría (sin publicar aún)
      - name: Show package contents
        run: npm pack --dry-run

      # token desde los secrets del repo
      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      # publicar. --access public es OBLIGATORIO para scope @vekziun
      - name: Publish @vekziun/napi
        run: npm publish --access public
